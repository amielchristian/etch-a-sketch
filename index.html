<!DOCTPYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Etch-a-Sketch</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="input">
            <input checked="true" type="radio" name="brushes" id="brushes" value="regular">
            <label>Regular</label>
            <input type="radio" name="brushes" id="brushes" value="rainbow">
            <label>Rainbow</label>
            <input type="radio" name="brushes" id="brushes" value="shader">
            <label>Shader</label>

            <input class="color-picker" type="color">
            <input class="slider" type="range" value="16" min="8" max="64" step="4">
            <p class="slider-value"></p>
        </div>

        <div class="grid">
        </div>
        
        <script type="text/javascript" src="script.js"></script>
    </body>
</html>
